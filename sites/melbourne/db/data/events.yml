  - id: 2537782432
    title: 'Requested Talk: How do `CurrentAttributes` work?'
    description: "**Description:**\r\nRails includes a class called `ActiveSupport::CurrentAttributes`
      that can be used to store values that relate only to the current request or
      job.\r\n\r\nFor example:\r\n```ruby\r\nclass Current < ActiveSupport::CurrentAttributes\r\n
      \ attribute :user\r\nend\r\n\r\nCurrent.user = User.first\r\n```\r\n\r\nHow
      does Rails store these values?\r\nHow can it ensure these values can only be
      read in the current request?\r\nWhat happens when you change the isolation level?\r\nFrom
      a practical standpoint, what does the isolation level mean?\r\n\r\n**Estimated
      Talk Time:**\r\n10–15 minutes"
    video_url: TODO
    speaker:
      name: TODO
      github_username: TODO
