  - id: 1956091676
    title: Thoughts on Environment Variables
    description: "A lightning talk 5 - 10 minutes on managing environment variables
      in rails.\r\n\r\n> You're app is coming along and all of a sudden you need to
      configure the number of workers, or an endpoint to access an API. You reach
      for `CONSTANTS` but very quickly you find out that these will vary between **development**,
      **test** and **production** apps. Not only that but you have a number of **\"production\"**
      apps like _staging_, _sandbox_, _UAT_ and the like. You also read up about [The
      Twelve-Factor App](https://12factor.net/) and you go for **Environment Variables**
      (`ENV_VARS`) to configure everything. But development becomes a night mare so
      you use `.env` files to store all these configurations. And then you get an
      API **Key \U0001F511** or **Secret \U0001F510** and you also through it into
      the `.env` file and even commit it to Git!!! \U0001F6A8 - at night you here
      yourself counselling yourself\r\n>    \"it's OK, it's a private repo\"\r\n>
      \   \"it's OK, it's only a developer secret\"\r\n\r\nIt's **NOT OK** this is
      the kind of behaviour that leads to security breaches and people being fired!
      - let's not blame the individuals but the process. The process of not having
      an easy way to store and share secrets is the root of the problem, and not developers
      accidentally sharing secrets they haphazardly saved to their publicly visible
      `.Dotfiles` git hub repo\r\n\r\nLearn:\r\n1. why to use Env Vars\r\n2. how to
      use `.env` https://github.com/bkeepers/dotenv and why it's a bad idea\r\n3.
      how to use **rails credentials** as well as Shopify's EJson, or Mozillas SOPS
      or Ansible's Vault\r\n4. how to easily manage and override credentials using
      Evil Martians AnywayConfg\r\n5. and why you should never be complacent with
      the way things are - learn how to break your system to make a better system\r\n\r\nwith
      code examples - https://github.com/failure-driven/env-var-demo"
    video_url: TODO
    speaker:
      name: TODO
      github_username: TODO
