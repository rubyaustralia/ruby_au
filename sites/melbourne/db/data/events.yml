- uuid: 7eb87dbe-e657-4505-b595-aed236d0696a
  date: '2024-06-27'
  type: meetup
  venue:
    name: BOYD Community Hub
    google_maps_url: https://maps.app.goo.gl/Tifehaitwnf2fJSq5
  talks:
  - id: 2271079974
    title: 'Talk Proposal: One does not simply... rebuild a product'
    description: "Description(this will appear on youtube): \r\n\r\n\"A rebuild is
      never finished, only started\"\r\n\r\nWe're rebuilding Culture Amp's second
      largest product - Performance. It's 9 years old, came in as a Series A acquisition
      5 years ago, has over 2700 customers with the largest one at 77k users. Against
      conventional wisdom, we're rebuilding it from the ground up with an aggressive
      timeline. The underlying model is outdated, slow to iterate on, and not extensible.
      The monoliths are riddled with tech debt, tightly coupled, patched and band-aided
      over many times, and won't scale to the $3b global Performance market we're
      targeting.\r\n\r\nThat wasn't challenging enough already so I'm also using this
      opportunity to rebuild our engineering culture. Setting a high bar for engineering
      standards, ways of working, and hoping to improve engagement as we go.\r\n\r\nIn
      this talk, I'll share:\r\n\r\n- How I came to this decision\r\n- How we got
      buy in from Exec and the Board for a purely technical rebuild\r\n- How we tried
      to set up for success, our principles and standards\r\n- Where we failed\r\n-
      Where we succeeded\r\n- Lessons that could be useful for anyone thinking about
      rebuilding a product that's hampering speed and hindering your ability to innovate
      or deliver value to your customers.\r\n\r\nThe rebuild is still in progress.
      I don't have all the answers (or any!). But we've already learned much - what
      to do, what not to do, and where the spiders are hiding.\r\n\r\nEstimated Talk
      Time: 35 - 40 minutes\r\n\r\nPreferred Month to Present: June\r\n\r\nPreferred
      Social media handles: https://www.linkedin.com/in/prakritimateti/\r\n\r\nMugshot
      (will be use in the slides): [link to photo](https://github.com/rubyaustralia/melbourne-ruby/assets/502956/6fd7dfe4-5f49-4c48-bccd-8784e41e48b7)\r\n\r\n\r\n"
