  talks:
  - id: 3171733200
    title: 'Talk Proposal: The Unspoken Contract: Communicating Intent Through Code'
    description: |-
      ### Description(this will appear on youtube):
      Code doesn’t just tell computers what to do—it tells future developers what you meant. In this talk, we’ll explore how a simple change in a Ruby on Rails app—replacing `image_tag` with `vite_image_tag`—unintentionally broke a core abstraction, causing a baffling `JSON::NestingError`.

      This bug wasn’t just about tools like Vite or Active Storage—it was a symptom of a deeper problem: intent wasn’t communicated clearly in the code.

      We’ll explore the idea of unspoken contracts in software—those invisible lines where systems, assumptions, and mental models meet. Through real-world examples, you’ll learn how to:

      - Recognise where intent gets lost in translation
      - Communicate purpose through naming, structure, and boundaries
      - Leave better breadcrumbs for your teammates and future self

      Whether you're refactoring, reviewing, or just trying to be less confusing, this talk will help you write code that speaks more clearly—even when you're not there to explain it.

      ### Estimated Talk Time:
      30 minutes

      ### Prefered Month to Present:
      June 2025

      ### Preferred Social media handles:
      GitHub: HashNotAdam
      LinkedIn: HashNotAdam

      ### Mugshot (will be use in the slides):
      Same as from our host slides
