  - id: 1784401161
    title: 'Talk Proposal: How FHIR is tackling a wicked problem with technical, social
      and political solutions'
    description: "Description (this will appear on YouTube): \r\n\r\nThe project of
      interoperability in healthcare is one that would make healthcare workers' jobs
      easier, our healthcare industry more efficient, and improve our experiences
      as patients. Yet, in spite of these upsides, the project has been held back
      by technical difficulty, a lack of cooperation and misaligned incentives. \r\n\r\nOne
      of the most promising developments in this space is HL7's FHIR standard, an
      extensible meta-model for exchanging healthcare data. Not only does FHIR offer
      some novel and fascinating techniques for flexibly modelling a wide range of
      data, it also engages in the community-building required to help it solve real
      problems, and the advocacy which is seeing it gain acceptance and mandate in
      national and international politics.\r\n\r\nThis talk will examine how Ruby
      developers can make productive use of FHIR in their projects, by describing
      the design of FHIR and the state of the tooling available to the Ruby ecosystem.
      Also discussed will be the lessons we can learn from FHIR on community-building
      and advocacy for our own technology solutions.\r\n\r\nEstimated Talk Time: 20
      minutes\r\n\r\nPreferred Month to Present: July '23\r\n\r\nPreferred Social
      Media Handles: matthood0@gmail.com\r\n\r\nMugshot (will be used in the slides):\r\n![mattbio](https://github.com/rubyaustralia/melbourne-ruby/assets/1885706/ebc7dec6-6fb4-4042-968e-b860ed8ef3f7)\r\n"
