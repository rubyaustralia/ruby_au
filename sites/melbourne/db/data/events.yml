- uuid: 66928cef-51b3-4761-8c0c-9c8b08cfe90d
  date: '2021-03-25'
  type: meetup
  venue:
    name: BOYD Community Hub
    google_maps_url: https://maps.app.goo.gl/Tifehaitwnf2fJSq5
  talks:
  - id: 839194785
    title: 'The Joy of Docs: Technical Writing for Developers and Engineers'
    description: "Hello organisers! I would like to propose a talk about technical
      writing. You can see the slide deck [here](https://docs.google.com/presentation/d/1somOY_01ZRgSxuAIX-RenImp9QkgytjpXwsKm91lYoo/edit?usp=sharing)
      if you'd like to suss it out more, but here's the gist. I can be available any
      Wednesday but need at least a few days' advance notice to let my D&D group know
      I won't be there :)\r\n\r\n## Talk Title\r\n\r\nThe Joy of Docs: Technical Writing
      for Developers and Engineers\r\n\r\n## Description\r\n\r\nIn this talk, I discuss
      communication, specifically technical writing, why it's important, and how to
      improve your skills. Emphasis is on identifying and empathising with your audience.
      The talk does not strictly cover the writing process as it is taught in schools,
      but rather focusses on orienting oneself towards readers' needs when writing
      technical documents or producing other technical writing. The information in
      this talk is applicable to any kind of technical writing, from commit messages
      to requests for comment (RFCs), as well as technical writing that is not strictly
      a part of a technical document (e.g., writing in an email to stakeholders about
      the status of development on a project). \r\n\r\n## Why It's Important\r\n\r\nBad
      technical writing is a huge waste of time. Every developer who's worked in the
      industry for any length of time has encountered vague and unhelpful documentation
      and seen how much time they spend trying to find information that should've
      been in the docs in the first place. Engineers who read RFCs and other longer-form
      documents may notice these documents often don't give adequate context or define
      terms, leading to more time spent on research rather than focussing on the tasks
      at hand."
    video_url: TODO
    speaker:
      name: TODO
      github_username: TODO
