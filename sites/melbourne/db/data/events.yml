- uuid: cc859181-b7c6-4cc4-a715-92c4c1d86369
  date: '2024-01-25'
  type: meetup
  venue:
    name: BOYD Community Hub
    google_maps_url: https://maps.app.goo.gl/Tifehaitwnf2fJSq5
  talks:
  - id: 2080633355
    title: Processing DMARC reports via Action Mailbox
    description: "Domain-based Message Authentication, Reporting, and Conformance
      (or DMARC) is an email validation system that builds upon Sender Policy Framework
      (SPF) and DomainKeys Identified Mail (DKIM) to protect email domains from being
      used in email spoofing, phishing scams, and other cybercrime.\r\n\r\nWhen creating
      a DMARC DNS record, you can include a `rua` attribute, the value of which is
      an email address that servers can send a daily report of the deliverability
      of emails from your domain. This provides valuable data that can help you check
      that you've approved every server that you expect to be able to send on your
      behalf and reduce the number of legitimate emails that are sent to spam. Unfortunately,
      these reports come as XML files which are usually GZipped which makes them poorly
      suited to human reading. Also, since they are sent by the receiving servers,
      you can expect to be sent many reports per day.\r\n\r\nThis talk is the story
      of how I leveraged Action Mailbox in Ruby on Rails to automatically parse incoming
      DMARC reports and alert me to issues in a human-readable format."
    video_url: TODO
    speaker:
      name: TODO
      github_username: TODO
  - id: 2075457487
    title: Something Something Fibers Something
    description: "Yes, the title of the talk is \"Something Something Fibers Something\"
      - I'll try and nail down more specifically what I want to talk about this weekend
      :)\r\n\r\nI'd like to do a talk that really gets into the low-level guts of
      how fibers work in Ruby. The rough kind of thing I'm thinking of covering is...\r\n\r\n*
      What a Fiber is, and how fibers relate to threads\r\n* How Fiber.yield/Fiber.resume
      work in Ruby\r\n* What you can build with them (e.g. implementing enumerators
      with them, \"saving\" the context of being inside a block)\r\n* How the Ruby
      and C call stacks relate to each other (this is important prerequisite info
      which is kind of genuinely interesting on its own)\r\n* How Fiber.yield and
      Fiber.resume are implemented in terms of the C call stack\r\n\r\nI would also
      like to talk about Fiber.transfer & the new Ruby fiber scheduler interface &
      the async gem, but let's see how much content ☝️  turns out to be. Maybe it's
      a different talk for another time.\r\n\r\nI'll be able to present this on Jan
      25."
    video_url: TODO
    speaker:
      name: TODO
      github_username: TODO
